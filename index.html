<!DOCTYPE html>
<html>
    <head>
        <title>
            Stranger Things Momemnts
        </title>
        <meta name = "viewport" content = "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
        <link rel= "stylesheet" type = "text/css" href = "style.css" />
    </head>
    <body>

        <div id = "homePageDivId" class = "pageClass1" >

            <img src = "./images/others/bgImg1.png" class = "pageClass1" style = "left:-30px;width:calc(100vw + 30px);"/>
            <div class = "fullPageClass1 centerPageClass1" style = "gap:40px;background-color: rgba(0, 0, 0, 0);height:80vh;">
                <button class = "buttonClass1" onclick = "pageChanger('homePageDivId','gamePageDivId',0)">PUZZLE</button>

                <button class = "buttonClass1" onclick = "pageChanger('homePageDivId','selectorPageDivId',0)">SEASON</button>
            </div>

            

        </div>

        <div id = "selectorPageDivId" class = "pageClass1" style = "display:none;overflow: hidden;">
            <img id = "selectorPageBGImg" src = "./images/others/bgImg1.png" class = "pageClass1" style = "left:-30px;width:calc(100vw + 30px);opacity: 0.6;" />
            <div id = "seasonPageDivId" class = "fullPageClass1 centerPageClass1" style = "gap:30px;">
                all SEASON
            </div>

            <div id = "episodePageDivId" class = "fullPageClass1" style = "display:none;">


                <div id = "episodePageInnerDivId" style = "position: absolute;top:80px;left:0px;width:100vw;height:calc(100vh - 80px);overflow-y: scroll;">

                </div>
                

            </div>

            <div id = "momentsPageDivId" class = "fullPageClass1 centerPageClass1" style = "gap:30px;display:none;">

            </div>

            <button id = "backButInSelec" class = "buttonClass1" onclick = "backFunInSelector()" style = "position:absolute;top:20px;right:20px;">BACK</button>
        </div>

        <div id = "gamePageDivId" class = "pageClass1" style = "display:none;">

            <img src = "./images/others/bgImg1.png" class = "pageClass1" style = "left:-30px;width:calc(100vw + 30px);"/>


            <div id = "solvingPageDivId" class = "pageClass1" >

                <div id = "solvingBar">
                <div id = "solvingInnerBar1"></div>
                   
                </div>


                <button id = "viewButId" class = "buttonClass1" style = "position:absolute;right:20px;bottom:20px;" onclick = "viewRelatedFun('A')">VIEW</button>
                <button id = "nextMomButId" class = "buttonClass1" style = "position:absolute;left:20px;bottom:20px;" onclick = "nextPuzzle()">NEXT</button>

                <button class = "buttonClass1" onclick = "pageChanger('gamePageDivId','homePageDivId',0)" style = "position:absolute;right:20px;top:20px;">BACK</button>
            </div>

            <div id = "viewPageDivId" class = "pageClass1" style = "display:none;">

                <div class = "fullPageClass1 centerPageClass1" style = "gap:30px;">

                    <div id = "viewImgDetails"></div>

                    <img id = "viewPageImg" src = "./momemtTest1.jpg" style = "width:252px;height:252px;" />

                    <p id = "viewPageTitle">This Is Spacial Moment</p>

                </div>
                


                <div class = "buttonClass1" onclick = "viewRelatedFun('B')" style = "position:absolute;right:20px;top:20px;">CANCLE</div>
            </div>


            <div id = "winningPageDivId" class = "pageClass1" style = "display:none;">

                <div class = "fullPageClass1 centerPageClass1" style = "gap:30px;height:80vh;">

                    <div >YOU SOLVED IT !</div>

                    <img id = "winningPageImg" src = "./momemtTest1.jpg" style = "width:252px;height:252px;" />

                    

                </div>
               

                <div class = "buttonClass1" onclick = "winningPageFun('resolve')" style = "position:absolute;left:20px;bottom:60px;">RE-SOLVE</div>
                <div class = "buttonClass1" onclick = "winningPageFun('next')" style = "position:absolute;right:20px;bottom:60px;">NEXT</div>
            </div>

             
        </div>
        
    </body>
    <script src = "script.js"></script>
</html>
